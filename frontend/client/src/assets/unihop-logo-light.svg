<svg width="600" height="420" viewBox="0 0 600 420" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Unihop — Ride. Connect. Go.</title>
  <desc>Unihop student carpool logo, two cars, light version</desc>
  <rect x="40" y="20" width="520" height="380" rx="24" fill="#F5FBF8"/>
  <rect x="40" y="20" width="520" height="380" rx="24" fill="none" stroke="#1D9E75" stroke-width="1.5"/>
  <circle cx="300" cy="170" r="108" fill="white" stroke="#1D9E75" stroke-width="3"/>
  <line x1="205" y1="212" x2="395" y2="212" stroke="#9FE1CB" stroke-width="2" stroke-linecap="round"/>
  <!-- Car 1 teal -->
  <rect x="210" y="192" width="72" height="20" rx="5" fill="#1D9E75"/>
