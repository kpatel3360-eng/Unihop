  <circle cx="266" cy="214" r="9" fill="#085041"/>
  <circle cx="266" cy="214" r="4" fill="white"/>
  <!-- Car 2 coral -->
  <rect x="318" y="192" width="72" height="20" rx="5" fill="#D85A30"/>
