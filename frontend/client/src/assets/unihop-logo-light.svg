  <text x="300" y="338" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="700" letter-spacing="-1">
    <tspan fill="#1D9E75">uni</tspan><tspan fill="#D85A30">hop</tspan>
  </text>
  <text x="300" y="370" text-anchor="middle" font-family="'Trebuchet MS', Helvetica, sans-serif" font-size="12" fill="#888780" letter-spacing="4">RIDE · CONNECT · GO</text>
  <line x1="238" y1="382" x2="362" y2="382" stroke="#9FE1CB" stroke-width="1"/>
  <text x="300" y="397" text-anchor="middle" font-family="'Trebuchet MS', Helvetica, sans-serif" font-size="10" fill="#1D9E75" letter-spacing="2">STUDENT CARPOOL</text>
