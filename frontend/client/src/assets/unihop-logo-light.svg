  <circle cx="374" cy="214" r="9" fill="#7a2a10"/>
  <circle cx="374" cy="214" r="4" fill="white"/>
  <!-- Hop arcs -->
  <path d="M220 170 Q258 112 300 102 Q342 92 380 137" fill="none" stroke="#1D9E75" stroke-width="3.5" stroke-linecap="round"/>
  <path d="M232 168 Q265 120 300 112 Q334 105 368 145" fill="none" stroke="#D85A30" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M244 166 Q272 130 300 122 Q327 116 356 150" fill="none" stroke="#9FE1CB" stroke-width="1.5" stroke-linecap="round"/>
