  <circle cx="300" cy="98" r="8" fill="#1D9E75"/>
  <circle cx="300" cy="98" r="4" fill="white"/>
  <!-- Graduation cap -->
  <rect x="288" y="84" width="24" height="5" rx="1.5" fill="#1D9E75"/>
